name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: lint
        run: |
          uv venv
          uv pip install ruff
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          ruff check src tests scripts
          ruff format --check src tests scripts

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: mypy
        run: |
          uv venv
          uv pip install -e ".[dev]"
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: test
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          source .venv/bin/activate 2>/dev/null || source .venv/Scripts/activate
          pytest -q -m "not live and not optional"

  doc-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: banned-phrase gate (with rc self-test)
        run: bash scripts/check_banned_phrases.sh
      - name: numeric-marker gate (with rc self-test)
        run: bash scripts/check_numeric_markers.sh
