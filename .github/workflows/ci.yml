name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash -euo pipefail {0}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv venv
      - run: uv pip install ruff
      - run: uv run ruff check src tests scripts
      - run: uv run ruff format --check src tests scripts

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - run: uv run mypy

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev]"
      - run: uv run pytest -q -m "not live and not optional"

  doc-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: banned-phrase gate (with rc self-test)
        run: bash scripts/check_banned_phrases.sh
      - name: numeric-marker gate (with rc self-test)
        run: bash scripts/check_numeric_markers.sh
